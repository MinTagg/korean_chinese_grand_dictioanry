name: Build Standalone Windows Executable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pyinstaller opencc-python-reimplemented

      - name: Build with PyInstaller
        run: |
          cd frontend
          pyinstaller --onefile --noconsole --name "백과사전 검색기" --icon "../icons/icon.ico" --add-data "templates;templates" --add-data "static;static" --add-data "../code_base;code_base" --collect-data opencc --hidden-import=opencc --hidden-import=code_base.accelon --paths=".." app.py

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: frontend/dist/백과사전 검색기.exe
